[build-system]
requires = ["uv_build>=0.11.7,<0.12"]
build-backend = "uv_build"

[project]
name = "ticket-router-agent"
version = "0.1.0"
requires-python = ">=3.13, <3.14"
dependencies = [
    "ticket-router-base",
    "llmcompressor>=0.10.0.1",
    "torch>=2.10.0",
    "vllm>=0.19.0",
    "pydantic>=2.13.2",
]

[tool.uv.sources]
ticket-router-base = { path = "../ticket_router_base", editable = true }
ticket-router-dataset = { path = "../ticket_router_dataset", editable = true }
